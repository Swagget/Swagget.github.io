name: Sync Notion to Posts

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.event.head_commit.author.username != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notion-sync/package.json

      - name: Install deps
        working-directory: notion-sync
        run: npm install --no-audit --no-fund

      - name: Run sync
        working-directory: notion-sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: npm run sync

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts
          [ -d images/posts ] && git add images/posts || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "sync: notion posts"
            git push
          fi
